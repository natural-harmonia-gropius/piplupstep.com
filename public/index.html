<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piplup Step | プロジェクトポッチャマ</title>
    <link
      rel="icon"
      href="https://www.pokemon.jp/special/project_pochama/favicon.ico"
    />
  </head>
  <body>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f1f1f1;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
          sans-serif;
      }

      #app {
        height: 100%;
        display: grid;
        place-items: center;
      }

      #youtube {
        width: clamp(160px, 100%, 1280px);
        /* height: clamp(90px, 100%, 720px); */
        aspect-ratio: 16 / 9;
      }
    </style>

    <main id="app">
      <iframe
        id="youtube"
        src="https://www.youtube.com/embed/bm0nLJuRNbw?si=3zqGh0u8FoSvXfFf"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </main>
  </body>
</html>
